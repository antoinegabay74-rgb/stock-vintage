<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestion Stock</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;600;700;800&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #F5F3EF;
      --card: #FFFFFF;
      --navy: #1C2B4A;
      --navy-light: #2E4170;
      --accent: #5B6AF5;
      --accent-light: #EEF0FF;
      --red: #E85D4A;
      --red-light: #FFF0EE;
      --green: #1A7A42;
      --green-light: #EEF8F2;
      --text: #1A1A2E;
      --muted: #8892A4;
      --border: #E8E5E0;
      --shadow: 0 2px 12px rgba(28,43,74,0.08);
      --shadow-lg: 0 8px 32px rgba(28,43,74,0.15);
    }

    body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    .header { background: var(--navy); height: 64px; padding: 0 32px; display: flex; align-items: center; position: sticky; top: 0; z-index: 100; }
    .logo { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; color: white; letter-spacing: -0.5px; }
    .logo span { color: #7C8FFF; }

    .main { max-width: 920px; margin: 0 auto; padding: 32px 24px; }

    .stats { display: flex; gap: 16px; margin-bottom: 32px; }
    .stat-card { background: var(--card); border-radius: 16px; padding: 20px 28px; display: flex; align-items: center; gap: 16px; box-shadow: var(--shadow); flex: 1; }
    .stat-icon { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; }
    .stat-icon.blue { background: var(--accent-light); }
    .stat-icon.green { background: var(--green-light); }
    .stat-number { font-family: 'Syne', sans-serif; font-size: 34px; font-weight: 700; color: var(--navy); line-height: 1; }
    .stat-label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-top: 4px; }

    .toolbar { display: flex; gap: 12px; margin-bottom: 20px; align-items: center; }
    .search-wrap { flex: 1; position: relative; }
    .search-wrap input { width: 100%; padding: 12px 16px 12px 44px; border: 1.5px solid var(--border); border-radius: 12px; font-family: 'Nunito', sans-serif; font-size: 14px; background: var(--card); outline: none; transition: border-color .2s; }
    .search-wrap input:focus { border-color: var(--accent); }
    .search-wrap .ico { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 16px; pointer-events: none; }
    select.filter { padding: 12px 16px; border: 1.5px solid var(--border); border-radius: 12px; font-family: 'Nunito', sans-serif; font-size: 14px; background: var(--card); color: var(--text); outline: none; cursor: pointer; min-width: 130px; }
    .btn-add { background: var(--accent); color: white; border: none; padding: 12px 20px; border-radius: 12px; font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; white-space: nowrap; transition: background .2s, transform .1s; }
    .btn-add:hover { background: var(--navy-light); transform: translateY(-1px); }

    .product-list { display: flex; flex-direction: column; gap: 12px; }
    .product-card { background: var(--card); border-radius: 16px; padding: 16px 20px; display: flex; align-items: center; gap: 16px; box-shadow: var(--shadow); transition: transform .15s, box-shadow .15s; animation: fadeUp .25s ease; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .product-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }

    .product-photo {
      width: 76px; height: 76px;
      border-radius: 12px;
      object-fit: cover;
      flex-shrink: 0;
      background: var(--bg);
      cursor: zoom-in;
    }
    #photo-popup {
      position: fixed;
      z-index: 9999;
      pointer-events: none;
      display: none;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 12px 48px rgba(0,0,0,0.35);
      border: 3px solid white;
      width: 320px;
      height: 320px;
    }
    #photo-popup img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .product-no-photo { width: 76px; height: 76px; border-radius: 12px; background: var(--accent-light); display: flex; align-items: center; justify-content: center; font-size: 28px; flex-shrink: 0; }
    .product-info { flex: 1; min-width: 0; }
    .product-name { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .product-sku { display: inline-block; background: var(--accent-light); color: var(--accent); font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 6px; margin-bottom: 7px; }
    .sizes-row { display: flex; gap: 6px; flex-wrap: wrap; }
    .size-badge { display: flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 8px; font-size: 12px; font-weight: 700; }
    .size-badge.in  { background: var(--green-light); color: var(--green); }
    .size-badge.out { background: #F5F5F5; color: #BBBBBB; }
    .product-date { font-size: 11px; color: var(--muted); margin-top: 5px; }
    .product-actions { display: flex; gap: 8px; flex-shrink: 0; }
    .btn-ico { width: 36px; height: 36px; border-radius: 10px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 15px; transition: background .15s, transform .1s; }
    .btn-edit { background: var(--accent-light); color: var(--accent); }
    .btn-edit:hover { background: var(--accent); color: white; transform: scale(1.05); }
    .btn-del { background: var(--red-light); color: var(--red); }
    .btn-del:hover { background: var(--red); color: white; transform: scale(1.05); }

    .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
    .empty .e-ico { font-size: 48px; margin-bottom: 14px; }
    .empty h3 { font-family: 'Syne', sans-serif; font-size: 18px; color: var(--text); margin-bottom: 6px; }

    .overlay { position: fixed; inset: 0; background: rgba(28,43,74,0.5); backdrop-filter: blur(4px); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px; opacity: 0; pointer-events: none; transition: opacity .2s; }
    .overlay.open { opacity: 1; pointer-events: all; }
    .modal { background: var(--card); border-radius: 24px; padding: 32px; width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; transform: translateY(20px); transition: transform .2s; box-shadow: 0 20px 60px rgba(28,43,74,0.25); }
    .overlay.open .modal { transform: translateY(0); }

    .modal-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; }
    .modal-title { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 700; color: var(--navy); }
    .btn-close { width: 36px; height: 36px; border-radius: 10px; border: none; background: var(--bg); cursor: pointer; font-size: 16px; color: var(--muted); transition: background .15s; }
    .btn-close:hover { background: var(--border); }

    .fg { margin-bottom: 20px; }
    .flabel { display: block; font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 8px; letter-spacing: .3px; }
    .finput { width: 100%; padding: 12px 16px; border: 1.5px solid var(--border); border-radius: 12px; font-family: 'Nunito', sans-serif; font-size: 14px; color: var(--text); outline: none; transition: border-color .2s; background: white; }
    .finput:focus { border-color: var(--accent); }

    .photo-zone { border: 2px dashed var(--border); border-radius: 16px; padding: 24px; text-align: center; cursor: pointer; transition: border-color .2s, background .2s; position: relative; overflow: hidden; }
    .photo-zone:hover, .photo-zone.drag { border-color: var(--accent); background: var(--accent-light); }
    .photo-zone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
    .photo-zone .pico { font-size: 30px; margin-bottom: 6px; }
    .photo-zone .ptxt { font-size: 13px; color: var(--muted); }
    .photo-zone .ptxt b { color: var(--accent); }
    #photo-preview { width: 100%; max-height: 180px; object-fit: cover; border-radius: 10px; display: none; }

    .sizes-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
    .sg-item { background: var(--bg); border-radius: 12px; padding: 10px; text-align: center; }
    .sg-label { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; color: var(--navy); margin-bottom: 8px; }
    .stepper { display: flex; align-items: center; justify-content: center; gap: 6px; }
    .s-btn { width: 26px; height: 26px; border-radius: 8px; border: 1.5px solid var(--border); background: white; cursor: pointer; font-size: 16px; font-weight: 700; display: flex; align-items: center; justify-content: center; color: var(--text); transition: background .15s; }
    .s-btn:hover { background: var(--accent); color: white; border-color: var(--accent); }
    .s-val { font-family: 'Syne', sans-serif; font-size: 17px; font-weight: 700; color: var(--navy); min-width: 20px; text-align: center; }

    .btn-save { width: 100%; padding: 14px; background: var(--navy); color: white; border: none; border-radius: 14px; font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 8px; transition: background .2s, transform .1s; }
    .btn-save:hover { background: var(--navy-light); transform: translateY(-1px); }
    .btn-save:disabled { opacity: .6; cursor: not-allowed; transform: none; }

    .del-modal { max-width: 380px; text-align: center; }
    .del-modal .d-ico { font-size: 46px; margin-bottom: 14px; }
    .del-modal p { color: var(--muted); font-size: 14px; margin-bottom: 24px; }
    .del-btns { display: flex; gap: 12px; }
    .btn-cancel { flex: 1; padding: 12px; border: 1.5px solid var(--border); border-radius: 12px; background: white; font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; transition: background .15s; }
    .btn-cancel:hover { background: var(--bg); }
    .btn-del-confirm { flex: 1; padding: 12px; background: var(--red); color: white; border: none; border-radius: 12px; font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; transition: background .15s; }
    .btn-del-confirm:hover { background: #d04030; }

    .location-badge { display: inline-flex; align-items: center; gap: 5px; background: #FFF7ED; color: #C2601A; border: 1px solid #FCDDB0; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 6px; margin-top: 4px; }
    .btn-locations { background: white; color: var(--navy); border: 1.5px solid var(--border); padding: 12px 16px; border-radius: 12px; font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; white-space: nowrap; transition: background .2s; }
    .btn-locations:hover { background: var(--bg); border-color: var(--navy); }
    .loc-list { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }
    .loc-item { display: flex; align-items: center; justify-content: space-between; background: var(--bg); border-radius: 10px; padding: 10px 14px; font-size: 14px; font-weight: 600; }
    .loc-del { background: none; border: 1px solid var(--border); border-radius: 7px; padding: 4px 8px; font-size: 12px; color: var(--muted); cursor: pointer; transition: all .15s; }
    .loc-del:hover { border-color: var(--red); color: var(--red); }
    @media (max-width: 600px) {
      .stats { flex-direction: column; }
      .toolbar { flex-wrap: wrap; }
      .header, .main { padding-left: 16px; padding-right: 16px; }
      .sizes-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

<header class="header">
  <div class="logo">stock<span>.</span>vintage</div>
</header>

<main class="main">
  <div class="stats">
    <div class="stat-card">
      <div class="stat-icon blue">📦</div>
      <div>
        <div class="stat-number" id="stat-total">—</div>
        <div class="stat-label">Produits</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon green">✅</div>
      <div>
        <div class="stat-number" id="stat-stock">—</div>
        <div class="stat-label">En stock</div>
      </div>
    </div>
  </div>

  <div class="toolbar">
    <div class="search-wrap">
      <span class="ico">🔍</span>
      <input type="text" id="search" placeholder="Rechercher par nom ou SKU..." oninput="render()">
    </div>
    <select class="filter" id="filter" onchange="render()">
      <option value="all">Tous</option>
      <option value="in">En stock</option>
      <option value="out">Rupture</option>
    </select>
    <button class="btn-locations" onclick="openModal('m-locations')">📦 Emplacements</button>
    <button class="btn-add" onclick="openAdd()">＋ Ajouter</button>
  </div>

  <div class="product-list" id="list">
    <div class="empty"><div class="e-ico">⏳</div><h3>Chargement…</h3></div>
  </div>
</main>

<!-- PRODUCT MODAL -->
<div class="overlay" id="m-product">
  <div class="modal">
    <div class="modal-head">
      <h2 class="modal-title" id="m-title">Nouveau produit</h2>
      <button class="btn-close" onclick="closeModal('m-product')">✕</button>
    </div>

    <div class="fg">
      <label class="flabel">Photo du produit</label>
      <div class="photo-zone" id="pzone"
        ondragover="event.preventDefault();this.classList.add('drag')"
        ondragleave="this.classList.remove('drag')"
        ondrop="onDrop(event)">
        <input type="file" accept="image/*" onchange="onFile(event)">
        <div id="p-placeholder">
          <div class="pico">📷</div>
          <div class="ptxt"><b>Clique ou glisse</b> une photo ici</div>
        </div>
        <img id="photo-preview" alt="aperçu">
      </div>
    </div>

    <div class="fg">
      <label class="flabel">Nom du produit</label>
      <input class="finput" type="text" id="f-name" placeholder="Ex : Body blanc Y2K">
    </div>

    <div class="fg">
      <label class="flabel">SKU Vinted</label>
      <input class="finput" type="text" id="f-sku" placeholder="Ex : sz25111010758731220059" autocomplete="off" spellcheck="false">
    </div>

    <div class="fg">
      <label class="flabel">Stock par taille</label>
      <div class="sizes-grid">
        <div class="sg-item">
          <div class="sg-label">XS</div>
          <div class="stepper">
            <button class="s-btn" onclick="chg('XS',-1)">−</button>
            <span class="s-val" id="q-XS">0</span>
            <button class="s-btn" onclick="chg('XS',1)">+</button>
          </div>
        </div>
        <div class="sg-item">
          <div class="sg-label">S</div>
          <div class="stepper">
            <button class="s-btn" onclick="chg('S',-1)">−</button>
            <span class="s-val" id="q-S">0</span>
            <button class="s-btn" onclick="chg('S',1)">+</button>
          </div>
        </div>
        <div class="sg-item">
          <div class="sg-label">M</div>
          <div class="stepper">
            <button class="s-btn" onclick="chg('M',-1)">−</button>
            <span class="s-val" id="q-M">0</span>
            <button class="s-btn" onclick="chg('M',1)">+</button>
          </div>
        </div>
        <div class="sg-item">
          <div class="sg-label">L</div>
          <div class="stepper">
            <button class="s-btn" onclick="chg('L',-1)">−</button>
            <span class="s-val" id="q-L">0</span>
            <button class="s-btn" onclick="chg('L',1)">+</button>
          </div>
        </div>
        <div class="sg-item" style="grid-column: 1 / -1;">
          <div class="sg-label">Taille Unique</div>
          <div class="stepper">
            <button class="s-btn" onclick="chg('TU',-1)">−</button>
            <span class="s-val" id="q-TU">0</span>
            <button class="s-btn" onclick="chg('TU',1)">+</button>
          </div>
        </div>
      </div>
    </div>

    <div class="fg">
      <label class="flabel">📦 Emplacement de stockage</label>
      <div id="f-location-tags" style="display:flex;flex-wrap:wrap;gap:8px;margin-top:4px"></div>
    </div>
    <button class="btn-save" id="btn-save" onclick="save()">💾 Enregistrer</button>
  </div>
</div>

<!-- LOCATIONS MODAL -->
<div class="overlay" id="m-locations">
  <div class="modal" style="max-width:460px">
    <div class="modal-head">
      <h2 class="modal-title">📦 Emplacements</h2>
      <button class="btn-close" onclick="closeModal('m-locations')">✕</button>
    </div>
    <div class="fg" style="display:flex;gap:8px;margin-bottom:8px">
      <input class="finput" type="text" id="loc-name" placeholder="Ex : Carton rouge - Sacs" style="flex:1">
      <button class="btn-save" style="width:auto;padding:12px 18px;margin:0" onclick="addLocation()">＋</button>
    </div>
    <div class="loc-list" id="loc-list"></div>
  </div>
</div>

<!-- DELETE MODAL -->
<div class="overlay" id="m-del">
  <div class="modal del-modal">
    <div class="d-ico">🗑️</div>
    <h2 class="modal-title" style="margin-bottom:8px">Supprimer ?</h2>
    <p>Cette action est irréversible. Le produit sera définitivement supprimé.</p>
    <div class="del-btns">
      <button class="btn-cancel" onclick="closeModal('m-del')">Annuler</button>
      <button class="btn-del-confirm" onclick="doDelete()">Supprimer</button>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════
// 🔥 FIREBASE CONFIG
// ════════════════════════════════════════════════════
const firebaseConfig = {
  apiKey:            "AIzaSyBs0xwSdbwZJCuOObW29Kxq2xjJ7OBL2II",
  authDomain:        "stock-a4872.firebaseapp.com",
  databaseURL:       "https://stock-a4872-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:         "stock-a4872",
  storageBucket:     "stock-a4872.firebasestorage.app",
  messagingSenderId: "229883808899",
  appId:             "1:229883808899:web:9e0069a6a3e75e243b9fb6"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const SIZES = ['XS','S','M','L','TU'];
let locations = {};
let products = [];
let editId   = null;
let delId    = null;
let photo    = null;

// ── LOAD LOCATIONS ───────────────────────────────
db.ref('locations').on('value', snap => {
  locations = snap.val() || {};
  updateLocationSelects();
  renderLocModal();
});

// ── LOAD ──────────────────────────────────────────
db.ref('products').on('value', snap => {
  products = [];
  const d = snap.val();
  if (d) {
    Object.entries(d).forEach(([id, p]) => products.push({ id, ...p }));
    products.sort((a, b) => new Date(b.date) - new Date(a.date));
  }
  updateStats();
  render();
});

// ── STATS ─────────────────────────────────────────
function totalStock(p) {
  const s = p.sizes || {};
  return SIZES.reduce((sum, sz) => sum + (s[sz] || 0), 0);
}

function updateStats() {
  const totalProducts = products.length;
  // Total de tous les articles en stock (somme de toutes les tailles de tous les produits)
  const totalItems = products.reduce((sum, p) => sum + totalStock(p), 0);
  document.getElementById('stat-total').textContent = totalProducts;
  document.getElementById('stat-stock').textContent = totalItems;
}

// ── RENDER ────────────────────────────────────────
function render() {
  const q  = document.getElementById('search').value.toLowerCase();
  const fl = document.getElementById('filter').value;

  const filtered = products.filter(p => {
    const ok  = !q || p.name.toLowerCase().includes(q) || (p.sku||'').toLowerCase().includes(q);
    const st  = totalStock(p);
    const fok = fl === 'all' || (fl === 'in' && st > 0) || (fl === 'out' && st === 0);
    return ok && fok;
  });

  const list = document.getElementById('list');
  if (!filtered.length) {
    list.innerHTML = `<div class="empty"><div class="e-ico">📭</div><h3>Aucun produit</h3><p>Clique sur "+ Ajouter" pour créer le premier produit.</p></div>`;
    return;
  }

  list.innerHTML = filtered.map(p => {
    const sz = p.sizes || {};
    const badges = SIZES.map(s => {
      const n = sz[s] || 0;
      return `<span class="size-badge ${n>0?'in':'out'}"><span>${s}</span> <strong>${n}</strong></span>`;
    }).join('');
    const img = p.photo
      ? `<img class="product-photo" src="${p.photo}" alt="${p.name}" loading="lazy">`
      : `<div class="product-no-photo">👗</div>`;
    const date = p.date ? new Date(p.date).toLocaleDateString('fr-FR') : '';
    return `<div class="product-card">
      ${img}
      <div class="product-info">
        <div class="product-name">${p.name}</div>
        ${p.sku ? `<div class="product-sku">SKU : ${p.sku}</div>` : ''}
        <div class="sizes-row">${badges}</div>
        ${p.locationId && locations[p.locationId] ? `<span class="location-badge">📦 ${locations[p.locationId].name}</span>` : ''}
        ${date ? `<div class="product-date">📅 ${date}</div>` : ''}
      </div>
      <div class="product-actions">
        <button class="btn-ico btn-edit" onclick="openEdit('${p.id}')" title="Modifier">✏️</button>
        <button class="btn-ico btn-del"  onclick="openDel('${p.id}')"  title="Supprimer">🗑️</button>
      </div>
    </div>`;
  }).join('');
}

// ── MODALS ────────────────────────────────────────
function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

document.querySelectorAll('.overlay').forEach(o =>
  o.addEventListener('click', e => { if (e.target === o) closeModal(o.id); })
);

// ── ADD / EDIT ────────────────────────────────────
function openAdd() {
  editId = null;
  document.getElementById('m-title').textContent = 'Nouveau produit';
  document.getElementById('f-name').value = '';
  document.getElementById('f-sku').value  = '';
  SIZES.forEach(s => document.getElementById(`q-${s}`).textContent = '0');
  resetPhoto();
  selectedLocationId = null; renderLocationTags();
  openModal('m-product');
}

function openEdit(id) {
  const p = products.find(x => x.id === id);
  if (!p) return;
  editId = id;
  document.getElementById('m-title').textContent = 'Modifier le produit';
  document.getElementById('f-name').value = p.name || '';
  document.getElementById('f-sku').value  = p.sku  || '';
  const sz = p.sizes || {};
  SIZES.forEach(s => document.getElementById(`q-${s}`).textContent = sz[s] || 0);
  if (p.photo) { showPreview(p.photo); photo = p.photo; } else resetPhoto();
  selectedLocationId = p.locationId || null; renderLocationTags();
  openModal('m-product');
}

function chg(size, delta) {
  const el = document.getElementById(`q-${size}`);
  el.textContent = Math.max(0, (parseInt(el.textContent) || 0) + delta);
}

// ── PHOTO ─────────────────────────────────────────
function resetPhoto() {
  photo = null;
  document.getElementById('photo-preview').style.display = 'none';
  document.getElementById('p-placeholder').style.display = 'block';
}
function showPreview(src) {
  const pr = document.getElementById('photo-preview');
  pr.src = src; pr.style.display = 'block';
  document.getElementById('p-placeholder').style.display = 'none';
}
function onFile(e) { if (e.target.files[0]) processImg(e.target.files[0]); }
function onDrop(e) {
  e.preventDefault();
  document.getElementById('pzone').classList.remove('drag');
  const f = e.dataTransfer.files[0];
  if (f && f.type.startsWith('image/')) processImg(f);
}
function processImg(file) {
  const r = new FileReader();
  r.onload = ev => {
    const img = new Image();
    img.onload = () => {
      const MAX = 420, c = document.createElement('canvas');
      let w = img.width, h = img.height;
      if (w > h && w > MAX) { h = h*MAX/w; w = MAX; }
      else if (h > MAX)     { w = w*MAX/h; h = MAX; }
      c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      photo = c.toDataURL('image/jpeg', 0.78);
      showPreview(photo);
    };
    img.src = ev.target.result;
  };
  r.readAsDataURL(file);
}

// ── SAVE ──────────────────────────────────────────
async function save() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { alert('Le nom est obligatoire.'); return; }
  const sku = document.getElementById('f-sku').value.trim();
  if (!sku) { alert('Le SKU est obligatoire.'); return; }

  const sizes = {};
  SIZES.forEach(s => sizes[s] = parseInt(document.getElementById(`q-${s}`).textContent) || 0);
  const locationId = selectedLocationId || null;

  const data = {
    name,
    sku:   document.getElementById('f-sku').value.trim(),
    sizes,
    locationId,
    photo: photo || null,
    date:  editId
      ? (products.find(x => x.id === editId)?.date || today())
      : today()
  };

  const btn = document.getElementById('btn-save');
  btn.textContent = 'Enregistrement…'; btn.disabled = true;
  try {
    if (editId) await db.ref(`products/${editId}`).update(data);
    else        await db.ref('products').push(data);
    closeModal('m-product');
  } catch(err) {
    alert('Erreur Firebase : ' + err.message);
  } finally {
    btn.textContent = '💾 Enregistrer'; btn.disabled = false;
  }
}

// ── DELETE ────────────────────────────────────────
function openDel(id)  { delId = id; openModal('m-del'); }
async function doDelete() {
  if (!delId) return;
  try { await db.ref(`products/${delId}`).remove(); closeModal('m-del'); delId = null; }
  catch(err) { alert('Erreur : ' + err.message); }
}


// ── LOCATIONS ─────────────────────────────────────
let selectedLocationId = null;

function updateLocationSelects() {
  renderLocationTags();
}

function renderLocationTags() {
  const wrap = document.getElementById('f-location-tags');
  if (!wrap) return;
  const entries = Object.entries(locations);
  if (!entries.length) {
    wrap.innerHTML = '<span style="font-size:13px;color:var(--muted)">Aucun emplacement — crée-en via 📦 Emplacements</span>';
    return;
  }
  wrap.innerHTML = entries.map(([id, loc]) => {
    const active = selectedLocationId === id;
    return `<button type="button" onclick="pickLocation('${id}')" style="padding:8px 14px;border-radius:10px;border:2px solid ${active ? '#C2601A' : 'var(--border)'};background:${active ? '#FFF7ED' : 'white'};color:${active ? '#C2601A' : 'var(--text)'};font-family:Nunito,sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s">📦 ${loc.name}</button>`;
  }).join('');
}

function pickLocation(id) {
  selectedLocationId = selectedLocationId === id ? null : id;
  renderLocationTags();
}

function renderLocModal() {
  const list = document.getElementById('loc-list');
  if (!list) return;
  const entries = Object.entries(locations);
  if (!entries.length) {
    list.innerHTML = '<div style="text-align:center;padding:20px;color:var(--muted);font-size:13px">Aucun emplacement créé</div>';
    return;
  }
  list.innerHTML = entries.map(([id, loc]) =>
    `<div class="loc-item"><span>📦 ${loc.name}</span><button class="loc-del" onclick="delLocation('${id}')">✕</button></div>`
  ).join('');
}

async function addLocation() {
  const inp = document.getElementById('loc-name');
  const name = inp.value.trim();
  if (!name) return;
  const id = '_' + Math.random().toString(36).slice(2,9);
  await db.ref('locations/' + id).set({ name });
  inp.value = '';
}

async function delLocation(id) {
  await db.ref('locations/' + id).remove();
}

function today() { return new Date().toISOString().split('T')[0]; }
